<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeepredict - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #1e2937;
            padding: 2rem 1rem;
            border-right: 1px solid #334155;
            z-index: 200;
        }
        .main {
            margin-left: 260px;
            padding: 2rem;
        }
        .tip-item {
            background: #334155;
            padding: 1.2rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo" style="margin-bottom: 2rem;">⚽ Zeepredict</div>
        <nav>
            <a href="#" class="active" style="display:block; padding:12px; border-radius:8px; margin-bottom:8px;">Dashboard</a>
            <a href="#">New Tip</a>
            <a href="#">Past Tips</a>
            <a href="index.html">View Public Site</a>
        </nav>
    </div>

    <div class="main">
        <div class="header" style="margin-bottom: 2rem;">
            <h1>Admin Dashboard</h1>
            <div>Welcome, Admin</div>
        </div>

        <div class="card">
            <h2>Add New Daily Tip</h2>
            <form id="tipForm">
                <input type="text" id="match" placeholder="Match (e.g. Man City vs Arsenal)" required>
                <input type="text" id="prediction" placeholder="Prediction (e.g. Man City Win)" required>
                <input type="text" id="odds" placeholder="Odds (e.g. 1.85)">
                <textarea id="writeup" rows="4" placeholder="Write-up / Reasoning..." required></textarea>
                <select id="league">
                    <option value="Premier League">Premier League</option>
                    <option value="La Liga">La Liga</option>
                    <option value="Serie A">Serie A</option>
                    <option value="Bundesliga">Bundesliga</option>
                    <option value="Champions League">Champions League</option>
                </select>
                <button type="submit" class="btn">Publish Tip</button>
            </form>
        </div>

        <div class="card">
            <h2>Recent Tips</h2>
            <div id="tipsList" class="tips-list"></div>
        </div>
    </div>

    <script>
        let tips = JSON.parse(localStorage.getItem('zeepredict_tips')) || [];

        function renderTips() {
            const list = document.getElementById('tipsList');
            list.innerHTML = tips.map((tip, index) => `
                <div class="tip-item">
                    <strong>${tip.match}</strong> — ${tip.prediction}
                    <span style="float:right;color:#60a5fa;">${tip.odds}</span><br>
                    <small>${tip.league} | ${new Date(tip.date).toLocaleDateString()}</small>
                    <p style="margin-top:10px;">${tip.writeup}</p>
                    <button onclick="deleteTip(${index})" style="background:#ef4444;margin-top:8px;">Delete</button>
                </div>
            `).join('');
        }

        document.getElementById('tipForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newTip = {
                match: document.getElementById('match').value,
                prediction: document.getElementById('prediction').value,
                odds: document.getElementById('odds').value,
                writeup: document.getElementById('writeup').value,
                league: document.getElementById('league').value,
                date: new Date().toISOString()
            };
            tips.unshift(newTip);
            localStorage.setItem('zeepredict_tips', JSON.stringify(tips));
            renderTips();
            this.reset();
            alert('✅ Tip published!');
        });

        function deleteTip(index) {
            if (confirm('Delete tip?')) {
                tips.splice(index, 1);
                localStorage.setItem('zeepredict_tips', JSON.stringify(tips));
                renderTips();
            }
        }

        // Shared mobile + dark mode
        const hamburger = document.createElement('div');
        // ... (for simplicity, assume header is separate or add later)
        renderTips();

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
