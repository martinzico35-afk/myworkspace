<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeepredict - Predictions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .prediction-card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        .league {
            color: #60a5fa;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .match {
            font-size: 1.35rem;
            font-weight: bold;
            margin: 0.6rem 0;
        }
        .prediction {
            color: var(--success);
            font-size: 1.15rem;
            font-weight: 600;
        }
        .odds {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">⚽ Zeepredict</a>
        <nav class="nav" id="nav-menu">
            <a href="index.html">Home</a>
            <a href="predictions.html" class="active">Predictions</a>
            <a href="fixtures.html">Fixtures</a>
            <a href="about.html">About</a>
            <a href="admin.html">Admin</a>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <button onclick="toggleDarkMode()" style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;margin-left:1rem;">🌙</button>
    </header>

    <div class="container">
        <h1 style="text-align: center; margin-bottom: 3rem;">Today's Predictions</h1>
        <div id="predictions-list"></div>
    </div>

    <script>
        function loadPredictions() {
            const predictions = JSON.parse(localStorage.getItem('zeepredict_tips') || '[]');
            const container = document.getElementById('predictions-list');
            container.innerHTML = '';

            if (predictions.length === 0) {
                container.innerHTML = '<div class="card" style="text-align: center; padding: 4rem;"><p style="color: #64748b; font-size: 1.2rem;">No predictions yet.<br>Add some from the <a href="admin.html" style="color:#60a5fa;">Admin panel</a>!</p></div>';
                return;
            }

            predictions.forEach((tip) => {
                const card = document.createElement('div');
                card.className = 'prediction-card';
                card.innerHTML = `
                    <div class="league">${tip.league || 'Unknown League'}</div>
                    <div class="match">${tip.match}</div>
                    <div class="prediction">Prediction: <strong>${tip.prediction}</strong></div>
                    <div class="odds">Odds: ${tip.odds || 'N/A'}</div>
                    <div class="writeup" style="margin-top: 1.2rem; line-height: 1.7; color: #cbd5e1;">${tip.writeup}</div>
                    <small style="color: #64748b; display: block; margin-top: 1rem;">Added: ${new Date(tip.date).toLocaleDateString()}</small>
                `;
                container.appendChild(card);
            });
        }

        // Mobile Menu & Dark Mode
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => navMenu.classList.toggle('active'));

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        window.onload = loadPredictions;
    </script>
</body>
</html>
