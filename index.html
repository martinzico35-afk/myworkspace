<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeepredict - Sports Predictions</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 900px;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        .tagline {
            font-size: 1.5rem;
            opacity: 0.95;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 16px 36px;
            background: #facc15;
            color: #1e3a8a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.08);
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Zeepredict</h1>
        <p class="tagline">Accurate Sports Predictions & Betting Insights</p>
        <a href="https://github.com/martinzico35-afk/myworkspace" class="btn">Explore the Project</a>
    </div>
</body>
</html>
