<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeepredict - Sports Predictions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
            color: white;
            min-height: 100vh;
        }
        .nav {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.8rem; font-weight: bold; }
        .links a {
            color: white;
            margin-left: 30px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 120px 20px;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #334155;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #60a5fa;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">⚽ Zeepredict</div>
        <div class="links">
            <a href="#">Predictions</a>
            <a href="#">Leagues</a>
            <a href="#">Stats</a>
            <a href="admin.html">Admin</a>
        </div>
    </div>

    <div class="hero">
        <h1>Accurate Daily Sports Predictions</h1>
        <p style="font-size:1.4rem; max-width:700px; margin:0 auto 30px;">Get expert tips, probabilities, and analysis for football matches.</p>
        <a href="admin.html" class="btn">Go to Admin Panel →</a>
    </div>

    <a href="admin.html" class="admin-link">👤 Admin Panel</a>
</body>
</html>
