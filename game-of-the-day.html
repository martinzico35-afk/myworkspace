<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zeepredict - Game of the Day">
    <meta name="keywords" content="sports predictions, football tips, game of the day">
    <meta property="og:title" content="Zeepredict - Game of the Day">
    <meta property="og:type" content="website">
    <title>Zeepredict - Game of the Day</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9917;</text></svg>">
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .prediction-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .prediction-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .prediction-card .league {
            color: #60a5fa;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .light-mode .prediction-card .league {
            color: #3b82f6;
        }
        .prediction-card .match {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 1rem 0;
        }
        .prediction-card .prediction {
            color: var(--success);
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .prediction-card .odds {
            color: var(--sport-energy);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .prediction-card .writeup {
            margin-top: 1.5rem;
            line-height: 1.8;
            color: var(--text-muted);
        }
        .match-time {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
            background: rgba(255, 71, 87, 0.15);
            color: var(--sport-energy);
        }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 4rem 1rem;
        }
        .page-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .page-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }
        .nav-tabs a {
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-weight: 500;
        }
        .nav-tabs a:hover {
            color: var(--accent);
        }
        .nav-tabs a.active {
            color: var(--sport-energy);
            border-bottom-color: var(--sport-energy);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="logo-text">&#9917; Zeepredict</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="predictions.html">Predictions</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode" aria-label="Toggle theme">&#127769;</button>
    </header>

    <main class="container">
        <h1 class="page-title">🎯 Game of the Day</h1>
        <p class="page-subtitle">Our top pick for today - the match we're most confident about</p>

        <nav class="nav-tabs">
            <a href="game-of-the-day.html" class="active">Game of Day</a>
            <a href="odds-5.html">5 Odds</a>
            <a href="odds-10.html">10 Odds</a>
            <a href="odds-50.html">50 Odds</a>
        </nav>

        <section id="predictions-list" aria-label="Game of the day prediction"></section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2025 Zeepredict. All rights reserved.</p>
    </footer>

    <script src="predictions-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>

    <script>
        function loadGameOfTheDay() {
            var container = document.getElementById('predictions-list');
            var tips = window.PredictionDB.getTips();
            
            // Get the first tip as game of the day (or you can filter by specific criteria)
            var gameOfDay = tips.length > 0 ? tips[0] : null;

            if (!gameOfDay) {
                container.innerHTML = '<div class="empty-state"><p>No game of the day available yet.</p></div>';
                return;
            }

            var matchDate = gameOfDay.matchDate
                ? new Date(gameOfDay.matchDate).toLocaleString()
                : (gameOfDay.date ? new Date(gameOfDay.date).toLocaleDateString() : 'Date not set');

            var card = document.createElement('article');
            card.className = 'prediction-card';
            card.innerHTML =
                '<div class="league">' + ZeepredictUtils.escapeHtml(gameOfDay.league || 'Unknown League') + '</div>' +
                '<div class="match">' + ZeepredictUtils.escapeHtml(gameOfDay.match) + ' <span class="badge">TODAY\'S TOP PICK</span></div>' +
                '<div class="match-time">' + matchDate + '</div>' +
                '<div class="prediction">Prediction: <strong>' + ZeepredictUtils.escapeHtml(gameOfDay.prediction) + '</strong></div>' +
                '<div class="odds">Odds: ' + ZeepredictUtils.escapeHtml(gameOfDay.odds) + '</div>' +
                '<div class="writeup">' + ZeepredictUtils.escapeHtml(gameOfDay.writeup) + '</div>';

            container.appendChild(card);
        }

        window.addEventListener('DOMContentLoaded', loadGameOfTheDay);
    </script>
</body>
</html>
